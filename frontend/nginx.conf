# frontend/nginx.conf
# Two jobs:
# 1. Serve the React static files (index.html, JS, CSS)
# 2. Proxy /api/* requests to the Spring Boot container
#    so the browser never has to know about port 8080

server {
    listen 80;
    server_name localhost;

    # Root: serve React static files from the dist build
    root /usr/share/nginx/html;
    index index.html;

    # React Router fix:
    # Without this, refreshing /products returns a 404 because
    # Nginx looks for a file called "products" — it doesn't exist.
    # try_files falls back to index.html and React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy:
    # Requests to /api/inventory_product → http://backend:8080/inventory_product
    # "backend" is the Docker Compose service name — Docker DNS resolves it.
    # We strip the /api prefix because Spring Boot routes don't have it.
    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout settings — increase if Spring Boot is slow to start
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}