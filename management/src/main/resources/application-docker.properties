# backend/src/main/resources/application-docker.properties
# This profile activates automatically when SPRING_PROFILES_ACTIVE=docker
# OR when you override values via docker-compose environment: block.
#
# The ${VAR_NAME} syntax reads from OS environment variables,
# which docker-compose injects from your .env file.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Show startup banner (helpful to know when the app is ready)
spring.main.banner-mode=console